<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Bcrypt Generator - Bcrypt密码哈希生成工具"><meta property="og:title" content="Bcrypt Generator"><title>Bcrypt Generator</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:800px;margin:0 auto;padding:24px}.card{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-bottom:20px}.card-header{background:#21262d;padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #30363d;color:#58a6ff}.card-body{padding:16px}.input-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}.input-row input[type=text],.input-row input[type=password]{flex:1;min-width:200px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:10px 16px;border-radius:8px;font-size:14px;font-family:monospace}.input-row input:focus{outline:none;border-color:#58a6ff}.options-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px;font-size:13px}.options-row select{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:6px 10px;border-radius:4px;font-size:13px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.hash-output{background:#0d1117;padding:16px;border-radius:6px;font-family:monospace;font-size:13px;word-break:break-all;min-height:50px;color:#7ee787;border:1px solid #30363d}.info-text{font-size:12px;color:#8b949e;margin-top:8px}.verify-section{margin-top:20px}.verify-row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;align-items:center}.verify-result{padding:8px 12px;border-radius:6px;font-size:13px;font-weight:500;margin-top:8px}.verify-success{background:rgba(35,134,54,.15);color:#3fb950}.verify-fail{background:rgba(218,54,51,.15);color:#f85149}</style></head><body><header><h1>🔐 Bcrypt Generator</h1><div class="lang-switch"><button class="active" onclick="setLang("zh")">中文</button><button onclick="setLang("en")">EN</button></div></header><div class="container"><div class="card"><div class="card-header">生成 Bcrypt 哈希</div><div class="card-body"><div class="input-row"><input type="password" id="password" placeholder="输入密码..." onkeydown="if(event.key==="Enter")generate()"></div><div class="options-row"><label>Salt 轮数: <select id="rounds"><option value="10" selected>10 (推荐)</option><option value="8">8</option><option value="12">12</option><option value="14">14</option></select></label></div><div class="input-row"><button class="btn btn-primary" onclick="generate()">🔐 生成哈希</button><button class="btn" onclick="copyHash()">📋 复制</button></div><div class="hash-output" id="hashOutput">等待生成...</div><div class="info-text" id="hashInfo"></div></div></div><div class="card verify-section"><div class="card-header">验证 Bcrypt 哈希</div><div class="card-body"><div class="input-row"><input type="password" id="verifyPassword" placeholder="输入密码..."><input type="text" id="verifyHash" placeholder="粘贴Bcrypt哈希..."></div><button class="btn btn-primary" onclick="verify()">✅ 验证</button><div id="verifyResult" style="margin-top:8px"></div></div></div></div><script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script><script>var lang="zh";function setLang(l){lang=l;document.querySelectorAll(".lang-switch button").forEach(function(b,i){b.classList.toggle("active",(i===0&&l==="zh")||(i===1&&l==="en"))})}function generate(){var password=document.getElementById("password").value;var rounds=parseInt(document.getElementById("rounds").value);if(!password){document.getElementById("hashOutput").textContent="请输入密码";return}document.getElementById("hashOutput").textContent="⏳ 生成中...";var salt=dcodeIO.bcrypt.genSaltSync(rounds);var hash=dcodeIO.bcrypt.hashSync(password,salt);document.getElementById("hashOutput").textContent=hash;document.getElementById("hashInfo").textContent="Salt轮数: "+rounds+" | 长度: "+hash.length+" 字符"}function copyHash(){var hash=document.getElementById("hashOutput").textContent;if(hash&&hash!=="等待生成..."&&!hash.startsWith("⏳")){navigator.clipboard.writeText(hash);var btn=event.target;btn.textContent="已复制!";setTimeout(function(){btn.textContent="📋 复制"},1500)}}function verify(){var pw=document.getElementById("verifyPassword").value;var hash=document.getElementById("verifyHash").value;var r=document.getElementById("verifyResult");if(!pw||!hash){r.innerHTML="<span class="verify-fail">请输入密码和哈希值</span>";return}try{var ok=dcodeIO.bcrypt.compareSync(pw,hash);r.innerHTML=ok?"<span class="verify-success">✅ 验证通过 - 密码匹配!</span>":"<span class="verify-fail">❌ 验证失败 - 密码不匹配</span>"}catch(e){r.innerHTML="<span class="verify-fail">❌ 无效的Bcrypt哈希格式</span>"}}</script></body></html>
